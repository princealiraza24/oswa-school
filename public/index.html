<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduMatrix — School Management</title>

<link rel="stylesheet" href="/src/style.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f2d6e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EduMatrix">
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">E</div>
      <h1>EduMatrix</h1>
      <p>School Management System</p>
      <span class="badge-online">🌐 Online</span>
    </div>
    <div class="field"><label>Username</label><input id="l-user" type="text" placeholder="Enter username"></div>
    <div class="field"><label>Password</label><input id="l-pass" type="password" placeholder="Enter password"></div>
    <p class="login-hint">Powered by Zyveron Technologies</p>
    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <p class="login-err hidden" id="l-err">Incorrect username or password.</p>
    <div class="login-loading hidden" id="l-load">Signing in...</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <aside class="sidebar" id="sidebar">
    <div class="sb-top">
      <div class="sb-brand">EduMatrix</div>
      <div class="sb-sub" id="sb-sub">School System</div>
    </div>
    <nav id="sb-nav"></nav>
    <div class="sb-bottom">
      <div class="av" id="sb-av">A</div>
      <div>
        <div class="sb-uname" id="sb-name">Admin</div>
        <div class="sb-urole" id="sb-role">Principal</div>
      </div>
      <button class="btn-logout" onclick="doLogout()" title="Logout">⇥</button>
    </div>
  </aside>

  <div class="ham" onclick="toggleSidebar()" id="ham">☰</div>
  <div class="overlay hidden" id="overlay" onclick="toggleSidebar()"></div>

  <main class="main-wrap">
    <header class="topbar">
      <span class="page-title" id="page-title">Dashboard</span>
      <div class="topbar-right">
        <span class="chip chip-blue" id="session-chip">Session 2025-26</span>
        <span class="date-txt" id="date-txt"></span>
        <div class="notif-wrap">
          <button class="notif-btn" onclick="toggleNotif()" id="notif-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M8 1a5 5 0 015 5v3l1.5 2.5h-13L3 9V6a5 5 0 015-5z"/>
              <path d="M6 12a2 2 0 004 0"/>
            </svg>
            <span class="notif-count hidden" id="notif-count">0</span>
          </button>
          <div class="notif-panel hidden" id="notif-panel"></div>
        </div>
      </div>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>

<div class="modal-bg hidden" id="modal-bg">
  <div class="modal-box">
    <div class="modal-head">
      <span id="modal-title">Form</span>
      <button onclick="closeModal()" class="modal-x">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script src="/src/app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('Service Worker registered:', reg))
      .catch(err => console.error('SW registration failed:', err));
  });
}
</script>

</body>
</html>
